# Render Blueprint — one free web service that runs signaling AND serves the
# Flutter web app (from signaling-server/public). No credit card required for
# Render's free plan. Render injects PORT automatically; the server reads it.
#
# Deploy: push this repo to GitHub → render.com → New → Blueprint → pick the repo.
# Build the web app first so signaling-server/public exists: `./build-web.sh`.
services:
  - type: web
    name: project-mask
    runtime: node
    plan: free
    rootDir: signaling-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
